<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S)ONE - Dashboard de Performance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">

<nav class="xone-navbar">
    <div class="nav-container">
        <div class="xone-brand">S)ONE <span class="brand-divider">|</span> <span class="sub-brand">Performance Hub</span></div>
        <div class="nav-right">
            <button id="themeToggle" class="nav-btn theme-btn">Mode Sombre / Clair</button>
        </div>
    </div>
</nav>

<div class="container">

    <header class="header">
        <h1>Métriques Système S)ONE</h1>
        <p class="sub">Analyse de la disponibilité de Septembre et des temps de réponse de l'infrastructure.</p>
    </header>

    <!-- BARRE DE FILTRES AVEC ONGLETS -->
    <div class="filter-bar">
        <button class="filter-btn active" onclick="changeTimeframe('hour')">Dernières 24 Heures</button>
        <button class="filter-btn" onclick="changeTimeframe('day')">7 Derniers Jours</button>
        <button class="filter-btn" onclick="changeTimeframe('week')">Mois de Septembre (Semaines)</button>
    </div>

    <!-- ZONE DES GRAPHIQUES SÉPARÉS -->
    <div class="charts-grid">
        
        <!-- Graphique 1 : Temps de Réponse -->
        <div class="card chart-card">
            <div class="card-header">
                <h2>Temps de réponse de l'instance</h2>
                <span class="m-badge">ms</span>
            </div>
            <div class="chart-container">
                <canvas id="latencyChart"></canvas>
            </div>
        </div>

        <!-- Graphique 2 : Disponibilité -->
        <div class="card chart-card">
            <div class="card-header">
                <h2>Disponibilité S)ONE</h2>
                <span class="m-badge">%</span>
            </div>
            <div class="chart-container">
                <canvas id="uptimeChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
/* 1. JEU DE DONNÉES CLAIRS (Heure, Jour, Semaine) */
const datasets = {
    hour: {
        labels: ['10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00', '00:00', '02:00', '04:00', '06:00', '08:00'],
        latency: [120, 145, 130, 260, 185, 110, 95, 105, 90, 95, 115, 122],
        uptime: [100, 100, 100, 99.8, 100, 100, 100, 100, 100, 100, 100, 100],
        uptimeMin: 99.5
    },
    day: {
        labels: ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'],
        latency: [124, 118, 245, 190, 132, 120, 115],
        uptime: [100, 100, 99.92, 99.97, 100, 100, 99.98],
        uptimeMin: 99.0
    },
    week: {
        labels: ['Semaine 36', 'Semaine 37', 'Semaine 38', 'Semaine 39', 'Semaine 40 (Fin Sept)'],
        latency: [135, 142, 188, 122, 119],
        uptime: [100, 99.98, 99.95, 99.99, 100],
        uptimeMin: 99.0
    }
};

/* 2. INITIALISATION DES GRAPHIQUES */
const ctxLatency = document.getElementById('latencyChart').getContext('2d');
const ctxUptime = document.getElementById('uptimeChart').getContext('2d');

const chartOptions = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
        x: { grid: { display: false } },
        y: { grid: { color: 'rgba(0, 0, 0, 0.05)' } }
    }
};

// Graphique des barres (Latency)
let latencyChart = new Chart(ctxLatency, {
    type: 'bar',
    data: {
        labels: datasets.hour.labels,
        datasets: [{
            data: datasets.hour.latency,
            backgroundColor: '#38bdf8',
            borderRadius: 4,
            barThickness: 'flex',
            maxBarThickness: 30
        }]
    },
    options: chartOptions
});

// Graphique des lignes (Uptime)
let uptimeChart = new Chart(ctxUptime, {
    type: 'line',
    data: {
        labels: datasets.hour.labels,
        datasets: [{
            data: datasets.hour.uptime,
            borderColor: '#0066cc',
            borderWidth: 3,
            pointRadius: 3,
            pointBackgroundColor: '#0066cc',
            tension: 0.1,
            fill: false
        }]
    },
    options: {
        ...chartOptions,
        scales: {
            x: { grid: { display: false } },
            y: { 
                min: datasets.hour.uptimeMin, 
                max: 100,
                ticks: { callback: v => v + '%' },
                grid: { color: 'rgba(0, 0, 0, 0.05)' }
            }
        }
    }
});

/* 3. FONCTION DE CHANGEMENT DYNAMIQUE */
function changeTimeframe(timeframe) {
    // Mises à jour des états des boutons
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // Injection des données
    latencyChart.data.labels = datasets[timeframe].labels;
    latencyChart.data.datasets[0].data = datasets[timeframe].latency;
    
    uptimeChart.data.labels = datasets[timeframe].labels;
    uptimeChart.data.datasets[0].data = datasets[timeframe].uptime;
    uptimeChart.options.scales.y.min = datasets[timeframe].uptimeMin;

    latencyChart.update();
    uptimeChart.update();
}

/* 4. MODE SOMBRE & CLAIR */
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    document.body.classList.toggle('light-mode');
    const isDark = document.body.classList.contains('dark-mode');
    const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
    const textColor = isDark ? '#94a3b8' : '#64748b';

    [latencyChart, uptimeChart].forEach(chart => {
        chart.options.scales.x.ticks.color = textColor;
        chart.options.scales.y.ticks.color = textColor;
        chart.options.scales.y.grid.color = gridColor;
        chart.update();
    });
});
</script>
</body>
</html>
